<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Juancito Pérez | Estudiante Universitario</title>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

    </head>
    <body>
      <input type="checkbox" id="theme-toggle" class="theme-toggle">
    <div class="page">
    <header class="header">
        <div class="logo">
            <img src="imágenes/logos/logoutn.svg" alt="Logo UTN">
        </div>
        <nav class="nav">
            <a href="index.html">Inicio</a>
            <a href="formacion.html">Formación</a>
            <a href="experiencia.html">Experiencia</a>
            <a href="proyectos.html">Proyectos</a>
            <a href="contacto.html">Contacto</a>
        </nav>
       <label for="theme-toggle" class="theme-switch">
            <span class="theme-switch__text theme-switch__text--light">LIGHT MODE</span>
            <span class="theme-switch__text theme-switch__text--dark">DARK MODE</span>

            <span class="theme-switch__thumb">
                <i class="fa-solid fa-sun theme-icon theme-icon--sun"></i>
                <i class="fa-solid fa-moon theme-icon theme-icon--moon"></i>
            </span>
        </label>
    </header>
    <section class="contacto">

    <h2 class="titulo-seccion">Contacto</h2>

    <div class="contenedor-formulario">
        <form class="formulario" action="https://formspree.io/f/xpqoeave" method="POST">

        <div class="grupo">
            <label>Nombre</label>
            <input type="text" name="nombre" placeholder="Tu nombre" required>
        </div>

        <div class="grupo">
            <label>Email</label>
            <input type="email" name="email"placeholder="Tu email" required>
        </div>

        <div class="grupo">
            <label>Motivo</label>
            <input type="text" name="motivo" placeholder="Motivo del mensaje" required>
        </div>

        <div class="grupo">
            <label>Mensaje</label>
            <textarea rows="5" name="mensaje" placeholder="Escribí tu mensaje..." required></textarea>
        </div>

        <button type="submit" class="btn-enviar">Enviar mensaje</button>

        </form>
        </div>

    </section>
    <footer class="footer">
        <div class="footer-redes">
            <a class="fa-brands fa-github" href="https://github.com" target="_blank"></a>
            <a class="fa-brands fa-linkedin" href="https://linkedin.com" target="_blank"></a>
            <a class="fa-brands fa-facebook" href="https://facebook.com" target="_blank"></a>
            <a class="fa-brands fa-instagram" href="https://instagram.com" target="_blank"></a>
        </div>
        <p>© 2026 Juancito Pérez</p>
    </footer>
    </div>
    </body>
    </html>
